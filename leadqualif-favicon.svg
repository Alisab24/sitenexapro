<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradient bleu → vert : couleurs distinctives de LeadQualif -->
    <linearGradient id="lqg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Fond carré arrondi avec gradient signature LeadQualif -->
  <rect width="32" height="32" rx="7" fill="url(#lqg)"/>
  <!-- Lettre L en path vectoriel - barre verticale + barre horizontale -->
  <polygon points="8,7 12,7 12,21 24,21 24,25 8,25" fill="white"/>
</svg>
